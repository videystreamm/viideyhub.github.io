<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stream Hub</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
}

header{
background:#111;
padding:12px;
text-align:center;
font-weight:bold;
}

/* PLAYER */
.player-box{
padding:10px;
}

video{
width:100%;
border-radius:10px;
background:black;
}

/* GRID VIDEO */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

.card{
background:#1a1a1a;
border-radius:10px;
overflow:hidden;
cursor:pointer;
}

.card img{
width:100%;
height:120px;
object-fit:cover;
display:block;
}

.card:hover{
transform:scale(1.02);
transition:0.2s;
}

/* BUTTON */
.btn{
display:block;
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:6px;
background:#e50914;
color:white;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>

<header>STREAM HUB</header>

<!-- POPUNDER -->
<script>
(function(s){
  s.dataset.zone='10874906';
  s.src='https://llvpn.com/tag.min.js';
})([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')));
</script>

<!-- VIDEO PLAYER -->
<div class="player-box">
<video id="player" controls autoplay>
<source src="https://cdn2.videy.co/igNJqKHy1.mp4" type="video/mp4">
</video>

<button class="btn" onclick="goDirect()">DOWNLOAD / WATCH FULL</button>
</div>

<!-- GRID VIDEO (THUMBNAIL) -->
<div class="grid">

<div class="card" onclick="playVideo('https://cdn2.videy.co/igNJqKHy1.mp4')">
<img src="https://picsum.photos/400/250?1">
</div>

<div class="card" onclick="playVideo('https://cdn2.videy.co/0QYBKhmV1.mp4')">
<img src="https://picsum.photos/400/250?2">
</div>

<div class="card" onclick="playVideo('https://cdn2.videy.co/DiNz1Szz1.mp4')">
<img src="https://picsum.photos/400/250?3">
</div>

<div class="card" onclick="playVideo('https://cdn2.videy.co/12v5ZzEP1.mp4')">
<img src="https://picsum.photos/400/250?4">
</div>

<div class="card" onclick="playVideo('https://cdn2.videy.co/IWLlNAKZ1.mp4')">
<img src="https://picsum.photos/400/250?5">
</div>

<div class="card" onclick="playVideo('https://cdn2.videy.co/LGDnuSQI1.mp4')">
<img src="https://picsum.photos/400/250?6">
</div>

</div>

<script>

const player = document.getElementById("player");

function playVideo(url){
player.src = url;
player.play();
}

function goDirect(){
window.open("https://crn77.com/4/10874904","_blank");
}

</script>

</body>
</html>
