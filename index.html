<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stream Hub</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
}

header{
background:#111;
padding:12px;
text-align:center;
font-weight:bold;
}

/* PLAYER */
.player-box{
padding:10px;
}

video{
width:100%;
border-radius:10px;
background:black;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

.card{
background:#1a1a1a;
border-radius:10px;
overflow:hidden;
cursor:pointer;
position:relative;
}

.card img{
width:100%;
height:120px;
object-fit:cover;
display:block;
}

/* loading label */
.card span{
position:absolute;
bottom:5px;
left:5px;
font-size:11px;
background:rgba(0,0,0,0.6);
padding:3px 6px;
border-radius:4px;
}
</style>
</head>

<body>

<header>STREAM HUB</header>

<!-- PLAYER -->
<div class="player-box">
<video id="player" controls autoplay></video>
</div>

<!-- GRID -->
<div class="grid" id="grid"></div>

<script>

const videos = [
"https://cdn2.videy.co/igNJqKHy1.mp4",
"https://cdn2.videy.co/0QYBKhmV1.mp4",
"https://cdn2.videy.co/DiNz1Szz1.mp4",
"https://cdn2.videy.co/12v5ZzEP1.mp4",
"https://cdn2.videy.co/IWLlNAKZ1.mp4",
"https://cdn2.videy.co/LGDnuSQI1.mp4"
];

const player = document.getElementById("player");
const grid = document.getElementById("grid");

// set default video
player.src = videos[0];

// function ambil thumbnail dari video asli
function generateThumbnail(videoUrl, callback){
const video = document.createElement("video");
video.src = videoUrl;
video.crossOrigin = "anonymous";
video.currentTime = 1;

video.addEventListener("loadeddata", ()=>{
const canvas = document.createElement("canvas");
canvas.width = 320;
canvas.height = 180;

const ctx = canvas.getContext("2d");
ctx.drawImage(video,0,0,canvas.width,canvas.height);

const img = canvas.toDataURL("image/jpeg");
callback(img);
});
}

// render grid
videos.forEach((url)=>{
generateThumbnail(url,(thumb)=>{

let card = document.createElement("div");
card.className = "card";

card.innerHTML = `
<img src="${thumb}">
<span>▶ Play</span>
`;

card.onclick = ()=>{
player.src = url;
player.play();
};

grid.appendChild(card);

});
});

</script>

</body>
</html>
