<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>viideyhub - Video</title>

<style>
body{
margin:0;
font-family:Arial;
background:#fff;
}

.header{
display:flex;
justify-content:space-between;
padding:12px;
border-bottom:1px solid #eee;
}

.logo{
font-weight:bold;
font-size:20px;
}

.upload{
background:#0d1b2a;
color:#fff;
padding:8px 16px;
border-radius:20px;
font-size:14px;
}

.container{
padding:10px;
}

.main{
position:relative;
}

video{
width:100%;
border-radius:15px;
background:#000;
display:block;
}

.overlay{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:60px;
color:#fff;
background:rgba(0,0,0,0.5);
width:80px;
height:80px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
cursor:pointer;
}

/* AGE MODAL */
.ageModal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
}

.ageBox{
background:#fff;
padding:20px;
border-radius:10px;
text-align:center;
max-width:300px;
}

.ageBtn{
margin-top:10px;
padding:10px;
width:100%;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.yes{
background:#0d1b2a;
color:#fff;
}

.no{
background:#ccc;
}
</style>
</head>

<body>

<!-- POPUNDER -->
<script>
(function(s){
s.dataset.zone='10879872',
s.src='https://al5sm.com/tag.min.js'
})
([document.documentElement, document.body]
.filter(Boolean)
.pop()
.appendChild(document.createElement('script')));
</script>

<!-- AGE CONFIRM -->
<div class="ageModal" id="ageModal">
  <div class="ageBox">
    <h3>🔞 Akses Terbatas</h3>
    <p>Konten ini sedang ramai dibicarakan dan tidak tersedia untuk semua pengguna.</p>
    <p>Beberapa bagian membuat banyak orang berhenti di tengah 😳</p>
    <p><b>Konfirmasi usia kamu untuk melanjutkan</b></p>

    <button class="ageBtn yes" onclick="confirmAge()">Saya 18+ • Lanjutkan</button>
    <button class="ageBtn no" onclick="exitSite()">Keluar</button>
  </div>
</div>

<div class="header">
  <div class="logo">viideyhub</div>
  <div class="upload">Upload</div>
</div>

<div class="container">

<div class="main" onclick="playVideo()">
  <video id="v1" src="https://cdn2.slicedrive.com/b06Rn9oP1.mp4"></video>
  <div class="overlay" id="o1">▶</div>
</div>

<div class="title">ibu tiri vs anak tiri 😱</div>
<div class="meta">🔥 Trending sekarang</div>

</div>

<script>

let clicked = false;

// cek age confirm
window.onload = function(){
  if(localStorage.getItem("ageConfirmed")){
    document.getElementById("ageModal").style.display = "none";
  }
}

function confirmAge(){
  localStorage.setItem("ageConfirmed", "true");
  document.getElementById("ageModal").style.display = "none";
}

function exitSite(){
  window.location.href = "https://www.google.com";
}

// play video
function playVideo(){
  if(!localStorage.getItem("ageConfirmed")){
    document.getElementById("ageModal").style.display = "flex";
    return;
  }

  let v = document.getElementById("v1");
  v.play();
  document.getElementById("o1").style.display = "none";

  if(!clicked){
    clicked = true;

    setTimeout(()=>{
      window.open("https://omg10.com/4/10888070","_blank");
    }, 1500);
  }
}

</script>

</body>
</html>
