<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload Video</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#0b0b0b;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:90%;
max-width:420px;
background:#151515;
padding:20px;
border-radius:12px;
text-align:center;
box-shadow:0 0 20px rgba(0,0,0,0.5);
}

h1{
font-size:20px;
margin-bottom:15px;
}

.upload-box{
border:2px dashed #444;
padding:30px;
border-radius:10px;
cursor:pointer;
margin-bottom:15px;
transition:0.3s;
}

.upload-box:hover{
border-color:#ff3b3b;
}

input[type="file"]{
display:none;
}

.btn{
display:block;
width:100%;
padding:14px;
background:#ff3b3b;
color:#fff;
border:none;
border-radius:8px;
font-weight:bold;
font-size:15px;
cursor:pointer;
margin-top:10px;
text-decoration:none;
}

.btn:hover{
background:#ff1f1f;
}

.result{
margin-top:15px;
font-size:13px;
word-break:break-all;
background:#222;
padding:10px;
border-radius:8px;
display:none;
}
</style>
</head>

<body>

<div class="container">

<h1>Upload Your Video</h1>

<label class="upload-box">
Click to select video
<input type="file" id="fileInput">
</label>

<button class="btn" onclick="uploadFake()">UPLOAD</button>

<div class="result" id="resultBox"></div>

</div>

<script>
// SIMULASI UPLOAD (bisa kamu ganti ke backend nanti)
function uploadFake(){
    let box = document.getElementById("resultBox");
    box.style.display = "block";
    
    let fakeLink = "https://your-domain.com/video/" + Math.random().toString(36).substring(2,10);

    box.innerHTML = "Upload Success!<br>Link:<br><b>" + fakeLink + "</b>";
}
</script>

</body>
</html>
