<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stream Hub</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
}

header{
background:#111;
padding:12px;
text-align:center;
font-weight:bold;
}

/* VIDEO */
.container{
padding:10px;
}

video{
width:100%;
border-radius:10px;
background:black;
}

/* BUTTON */
.btn{
display:block;
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:6px;
background:#e50914;
color:white;
font-weight:bold;
cursor:pointer;
}

/* LIST */
.list{
margin-top:15px;
display:flex;
flex-direction:column;
gap:8px;
}

.item{
background:#1a1a1a;
padding:10px;
border-radius:8px;
cursor:pointer;
font-size:13px;
}

/* ADS SLOT */
.adbox{
background:#1a1a1a;
padding:10px;
margin-top:10px;
border-radius:8px;
text-align:center;
color:#aaa;
font-size:12px;
}
</style>
</head>

<body>

<header>STREAM HUB</header>

<div class="container">

<!-- POPUNDER SLOT (jalan saat user masuk) -->
<script>
(function(s){
  s.dataset.zone='10874906';
  s.src='https://llvpn.com/tag.min.js';
})([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')));
</script>

<!-- VIDEO PLAYER -->
<video id="player" controls autoplay>
<source src="https://cdn2.videy.co/igNJqKHy1.mp4" type="video/mp4">
</video>

<!-- ADS SLOT -->
<div class="adbox">ADVERTISEMENT SPACE</div>

<!-- DIRECT LINK BUTTON -->
<button class="btn" onclick="goDirect()">
DOWNLOAD / WATCH FULL
</button>

<div class="adbox">RELATED CONTENT ADS</div>

<!-- LIST VIDEO -->
<div class="list" id="list"></div>

</div>

<script>
// DIRECT LINK
function goDirect(){
window.open("https://crn77.com/4/10874904","_blank");
}

// VIDEO LIST (monetize retention)
const videos = [
"https://cdn2.videy.co/igNJqKHy1.mp4",
"https://cdn2.videy.co/0QYBKhmV1.mp4",
"https://cdn2.videy.co/DiNz1Szz1.mp4",
"https://cdn2.videy.co/12v5ZzEP1.mp4",
"https://cdn2.videy.co/IWLlNAKZ1.mp4",
"https://cdn2.videy.co/LGDnuSQI1.mp4",
"https://cdn2.videy.co/bFR9unDs1.mp4",
"https://cdn.videy.co/nLwWp4f51.mp4"
];

const player = document.getElementById("player");
const list = document.getElementById("list");

videos.forEach((v,i)=>{
let div = document.createElement("div");
div.className="item";
div.innerText="Video "+(i+1);
div.onclick=()=>{
player.src=v;
player.play();
};
list.appendChild(div);
});

// OPTIONAL: auto engagement boost (safe)
setInterval(()=>{
console.log("engagement active");
},10000);

</script>

</body>
</html>
