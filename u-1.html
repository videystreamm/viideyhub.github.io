<!DOCTYPE html>
<html lang="id">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>viideyhub - Video</title>

<style>
body{
margin:0;
font-family:Arial;
background:#fff;
}

.header{
display:flex;
justify-content:space-between;
padding:12px;
border-bottom:1px solid #eee;
}

.logo{
font-weight:bold;
font-size:20px;
}

.upload{
background:#0d1b2a;
color:#fff;
padding:8px 16px;
border-radius:20px;
font-size:14px;
}

.container{
padding:10px;
}

.main{
position:relative;
}

video{
width:100%;
border-radius:15px;
background:#000;
display:block;
}

.overlay{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:60px;
color:#fff;
background:rgba(0,0,0,0.5);
width:80px;
height:80px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
cursor:pointer;
}

.title{
font-weight:bold;
margin:10px 0;
}

.meta{
font-size:13px;
color:#666;
}

/* POPUP USIA */
.age-popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
}

.age-box{
background:#fff;
padding:25px;
width:90%;
max-width:320px;
border-radius:15px;
text-align:center;
}

.age-box h2{
margin-top:0;
font-size:20px;
}

.age-box p{
font-size:14px;
color:#555;
line-height:1.5;
}

.age-btn{
margin-top:15px;
background:#0d1b2a;
color:#fff;
border:none;
padding:12px 20px;
border-radius:10px;
font-size:15px;
cursor:pointer;
width:100%;
}
</style>

</head>

<body>

<!-- POPUNDER -->
<script>
(function(s){
s.dataset.zone='10879872',
s.src='https://al5sm.com/tag.min.js'
})
([document.documentElement, document.body]
.filter(Boolean)
.pop()
.appendChild(document.createElement('script')));
</script>

<div class="header">
  <div class="logo">viideyhub</div>
  <div class="upload">Upload</div>
</div>

<div class="container">

<div class="main" onclick="playVideo()">
  <video id="v1" src="https://cdn2.slicedrive.com/NOCY5i661.mp4"></video>
  <div class="overlay" id="o1">▶</div>
</div>

<div class="title">Video Viral</div>
<div class="meta">🔥 Trending sekarang</div>

</div>

<!-- POPUP KONFIRMASI USIA -->
<div class="age-popup" id="agePopup">
  <div class="age-box">
    <h2>Konfirmasi Usia</h2>

    <p>
      Konten ini hanya untuk pengguna berusia 18 tahun ke atas.
    </p>

    <button class="age-btn" onclick="closeAgePopup()">
      Saya Berusia 18+
    </button>
  </div>
</div>

<script>

let clicked = false;

function playVideo(){

let v = document.getElementById("v1");

v.play();

document.getElementById("o1").style.display = "none";

// DIRECT LINK (halus + 1x)
if(!clicked){

clicked = true;

setTimeout(()=>{

window.open("https://omg10.com/4/10888070","_blank");

}, 1000);

}

}

// KONFIRMASI USIA DETIK 15
let ageShown = false;

document.getElementById("v1").addEventListener("timeupdate", function(){

if(this.currentTime >= 15 && !ageShown){

ageShown = true;

this.pause();

document.getElementById("agePopup").style.display = "flex";

}

});

function closeAgePopup(){

document.getElementById("agePopup").style.display = "none";

document.getElementById("v1").play();

}

</script>

</body>
</html>
