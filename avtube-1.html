<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>videypro - Video</title>

<style>
body{
margin:0;
font-family:Arial;
background:#fff;
}

.header{
display:flex;
justify-content:space-between;
padding:12px;
border-bottom:1px solid #eee;
}

.logo{
font-weight:bold;
font-size:20px;
}

.upload{
background:#0d1b2a;
color:#fff;
padding:8px 16px;
border-radius:20px;
font-size:14px;
}

.container{
padding:10px;
}

.main{
position:relative;
}

video{
width:100%;
border-radius:15px;
background:#000;
display:block;
}

.overlay{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:60px;
color:#fff;
background:rgba(0,0,0,0.6);
width:90px;
height:90px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
cursor:pointer;
}

.title{
font-weight:bold;
margin:10px 0;
font-size:16px;
}

.meta{
font-size:13px;
color:#666;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">videypro</div>
  <div class="upload">Upload</div>
</div>

<div class="container">

<div class="main" onclick="playVideo()">
  <video id="v1" preload="metadata">
    <source src="https://cdn2.videy.co/rxmnmhpU1.mp4" type="video/mp4">
  </video>
  <div class="overlay" id="o1">▶</div>
</div>

<div class="title">Klik untuk lihat endingnya... 😱</div>
<div class="meta">👁️ 18.7K ditonton • 3 jam lalu</div>

</div>

<script>

let clicked = false;

function playVideo(){
let v = document.getElementById("v1");

// play video
v.play();
document.getElementById("o1").style.display = "none";

// IKLAN KADAM (1x, aman & cuan)
if(!clicked){
clicked = true;

setTimeout(()=>{
window.open("https://viiukuhe.com/dc/?blockID=391669","_blank");
}, 1000); // delay natural

}
}

</script>

</body>
</html>
