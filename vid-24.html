<!-- POPUNDER ROTATOR MAX CPM -->
<script>

const popZones = [

function(){
(function(s){
s.dataset.zone='10980339',
s.src='https://al5sm.com/tag.min.js'
})([document.documentElement, document.body]
.filter(Boolean)
.pop()
.appendChild(document.createElement('script')));
},

function(){
(function(s){
s.dataset.zone='10992483',
s.src='https://al5sm.com/tag.min.js'
})([document.documentElement, document.body]
.filter(Boolean)
.pop()
.appendChild(document.createElement('script')));
}

];

function randomPop(){
let random = Math.floor(Math.random()*popZones.length);
popZones[random]();
}

</script>

<script>

const playBtn = document.getElementById("playBtn");
const overlay = document.getElementById("overlay");
const video = document.getElementById("video");

/*
ANTI SPAM
POPUNDER COOLDOWN
*/

if(!localStorage.getItem("first_pop")){

playBtn.onclick = () => {

overlay.style.display = "block";

setTimeout(()=>{

overlay.style.display = "none";

randomPop();

localStorage.setItem("first_pop","1");

video.play();

playBtn.style.display = "none";

},900);

};

}else{

playBtn.onclick = () => {

video.play();

playBtn.style.display = "none";

};

}

/*
SECOND POP AFTER 40 SEC
*/

setTimeout(()=>{

localStorage.removeItem("first_pop");

},40000);

/*
EXIT POPUNDER
*/

window.addEventListener("beforeunload",function(){

if(!sessionStorage.getItem("exit_pop")){

sessionStorage.setItem("exit_pop","1");

randomPop();

}

});

</script>
